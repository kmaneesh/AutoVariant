services:
  app:
    build: .
    ports:
      - "127.0.0.1:9000:9000"
    environment:
      VCF_DIR: /data
    volumes:
      # Always mount host ./data so VCF files are available at /data in the container
      - ./data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
