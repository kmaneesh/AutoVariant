<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoVariant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/site.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 antialiased">
  <div class="min-h-screen flex flex-col">
    <header class="border-b border-slate-200 bg-white shadow-sm">
      <div class="max-w-2xl mx-auto px-4 sm:px-6 py-6">
        <h1 class="text-2xl font-bold text-slate-900 tracking-tight">AutoVariant</h1>
        <p class="mt-1 text-sm text-slate-500">Search a VCF by gene symbol or location; view the 7-step variant message (SOP).</p>
      </div>
    </header>

    <main class="flex-1 max-w-2xl w-full mx-auto px-4 sm:px-6 py-8">
      <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 sm:p-8">
        <div class="space-y-5">
          <div>
            <label for="search-query" class="block text-sm font-medium text-slate-700 mb-1.5">Gene or location</label>
            <input
              type="text"
              id="search-query"
              name="query"
              placeholder="e.g. FAH, 80472479, chr15:80472479"
              autocomplete="off"
              class="block w-full rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-slate-900 placeholder-slate-400 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 focus:outline-none transition shadow-sm"
            />
          </div>

          <div>
            <label for="vcf-select" class="block text-sm font-medium text-slate-700 mb-1.5">VCF file</label>
            <select
              id="vcf-select"
              name="vcf_path"
              class="block w-full rounded-lg border border-slate-300 bg-white shadow-sm"
            >
              <option value="">— Select a VCF —</option>
            </select>
          </div>

          <button
            type="button"
            id="search-btn"
            class="w-full sm:w-auto inline-flex items-center justify-center rounded-lg bg-emerald-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 disabled:opacity-60 disabled:pointer-events-none transition"
          >
            Search
          </button>
        </div>

        <div id="search-result" class="mt-6 min-h-[120px]" aria-live="polite"></div>
      </section>
    </main>

    <footer class="py-4 text-center text-xs text-slate-400">
      AutoVariant · No AI · Deterministic variant search
    </footer>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  <script src="/static/js/app.js" defer></script>
</body>
</html>
